<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LootRadar">
  <defs>
    <linearGradient id="bezel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b9094"/>
      <stop offset=".5" stop-color="#3a3c3f"/>
      <stop offset="1" stop-color="#202124"/>
    </linearGradient>
    <linearGradient id="b1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#eef1f2"/>
      <stop offset="1" stop-color="#f6eeaa"/>
    </linearGradient>
    <linearGradient id="b2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#33d9c2"/>
    </linearGradient>
    <linearGradient id="b3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00d7e8"/>
      <stop offset="1" stop-color="#39d6a0"/>
    </linearGradient>
    <mask id="ringgap">
      <rect width="512" height="512" fill="#fff"/>
      <rect x="252" y="20" width="270" height="72" rx="14" fill="#000" transform="rotate(9 256 256)"/>
      <rect x="-10" y="420" width="270" height="72" rx="14" fill="#000" transform="rotate(9 256 256)"/>
    </mask>
  </defs>

  <!-- teal dış halka (iki notch ile dinamik form) -->
  <circle cx="256" cy="256" r="250" fill="#3ed0b4" mask="url(#ringgap)"/>
  <!-- metalik bezel halka -->
  <circle cx="256" cy="256" r="205" fill="url(#bezel)"/>
  <!-- siyah merkez -->
  <circle cx="256" cy="256" r="168" fill="#050506"/>

  <!-- Solana barları (sağa yaslı paralelkenarlar) -->
  <g>
    <path d="M186 176 L352 176 L326 218 L160 218 Z" fill="url(#b1)"/>
    <path d="M186 235 L352 235 L326 277 L160 277 Z" fill="url(#b2)"/>
    <path d="M186 294 L352 294 L326 336 L160 336 Z" fill="url(#b3)"/>
  </g>
</svg>
