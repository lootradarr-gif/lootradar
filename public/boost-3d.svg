    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#ffcf4d" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffcf4d" stop-opacity="0"/>
